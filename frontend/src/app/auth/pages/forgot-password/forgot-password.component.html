<section class="auth-card">
  <h1>Forgot Password</h1>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>
      Email
      <input type="email" formControlName="email" />
    </label>

    <button type="submit" [disabled]="loading">{{ loading ? 'Generating...' : 'Generate Reset Code' }}</button>
  </form>

  <p class="error" *ngIf="error">{{ error }}</p>
  <p class="message" *ngIf="message">{{ message }}</p>

  <div class="code-box" *ngIf="resetCode">
    <p><strong>Your reset code:</strong> {{ resetCode }}</p>
    <p *ngIf="expiresInMinutes">Expires in {{ expiresInMinutes }} minutes</p>
    <a routerLink="/auth/reset-password">Go to Reset Password</a>
  </div>
</section>
