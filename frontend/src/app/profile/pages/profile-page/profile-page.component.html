<section class="profile-card" *ngIf="user$ | async as user; else noSession">
  <h1>Profile</h1>
  <p><strong>Role:</strong> {{ user.role }}</p>
  <p><strong>Locked:</strong> {{ user.isLocked ? 'Yes' : 'No' }}</p>

  <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="profile-form">
    <label>
      Full Name
      <input type="text" formControlName="fullName" />
    </label>

    <label>
      Email
      <input type="email" formControlName="email" />
    </label>

    <button type="submit" [disabled]="profileLoading">{{ profileLoading ? 'Saving...' : 'Save Profile' }}</button>
  </form>

  <form [formGroup]="passwordForm" (ngSubmit)="submitPasswordChange()" class="profile-form">
    <h3>Change Password</h3>

    <label>
      Current Password
      <input type="password" formControlName="currentPassword" />
    </label>

    <label>
      New Password
      <input type="password" formControlName="newPassword" />
    </label>

    <label>
      Confirm Password
      <input type="password" formControlName="confirmPassword" />
    </label>

    <button type="submit" [disabled]="passwordLoading">
      {{ passwordLoading ? 'Updating...' : 'Change Password' }}
    </button>
  </form>

  <p class="success" *ngIf="profileMessage">{{ profileMessage }}</p>
  <p class="success" *ngIf="passwordMessage">{{ passwordMessage }}</p>
  <p class="error" *ngIf="error">{{ error }}</p>

  <button (click)="logout()">Logout</button>
</section>

<ng-template #noSession>
  <p>No active session in client state. Please log in.</p>
</ng-template>
