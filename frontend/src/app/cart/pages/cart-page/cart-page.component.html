<h1>Cart</h1>
<p class="error" *ngIf="error">{{ error }}</p>
<p *ngIf="loading">Loading cart...</p>

<section *ngIf="!loading && cart" class="cart-wrap">
  <article class="cart-item" *ngFor="let item of cart.items">
    <img *ngIf="item.imageUrl" [src]="item.imageUrl" [alt]="item.productName" />
    <div>
      <h3>{{ item.productName }}</h3>
      <p>{{ item.productSku }}</p>
      <p>Unit: {{ item.unitPrice }}</p>
      <p>Line: {{ item.lineTotal }}</p>
      <div class="qty-actions">
        <button (click)="decrement(item.id, item.quantity)">-</button>
        <span>{{ item.quantity }}</span>
        <button (click)="increment(item.id, item.quantity)">+</button>
        <button (click)="remove(item.id)">Remove</button>
      </div>
    </div>
  </article>

  <footer class="cart-footer">
    <p><strong>Items:</strong> {{ cart.totals.itemCount }}</p>
    <p><strong>Subtotal:</strong> {{ cart.totals.subtotal }}</p>
    <a routerLink="/checkout" class="checkout-btn">Proceed to Checkout</a>
  </footer>
</section>
