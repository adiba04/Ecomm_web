<article class="product-card" (click)="onView()">
  <img [src]="imageSrc" [alt]="product.name" />
  <div class="card-content">
    <h3>{{ product.name }}</h3>
    <p>{{ product.description }}</p>
    <div class="card-footer">
      <strong>{{ product.price }}</strong>
      <span [class.low-stock]="product.stockQuantity < 5">Stock: {{ product.stockQuantity }}</span>
    </div>
  </div>
</article>
